<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한문 성어 퀴즈</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:#1a1410;--ink-soft:#3d3530;--ink-muted:#7a6e66;
    --paper:#f7f3ed;--paper-warm:#ede7db;--paper-card:#faf8f4;
    --accent:#8b3a2a;--accent-bg:#f9ede9;
    --gold:#b8860b;--gold-light:#e8d48a;
    --teal:#1e6b6b;
    --border:#d9cfc3;--border-dark:#b0a496;
    --correct:#2d6a4f;--correct-bg:#d8f3dc;
    --wrong:#7b2d2d;--wrong-bg:#f8d7da;
    --reveal-bg:#dde9f5;--reveal:#1a4f7a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;
    background-image:radial-gradient(ellipse at 20% 10%,rgba(184,134,11,.06) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 90%,rgba(139,58,42,.05) 0%,transparent 50%)}

  header{background:var(--ink);color:var(--paper);padding:1rem 2rem;display:flex;align-items:center;
    justify-content:space-between;gap:1rem;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25)}
  .logo{font-family:'Noto Serif KR',serif;font-size:1.15rem;font-weight:700;letter-spacing:.08em;
    display:flex;align-items:center;gap:.5rem}
  .logo .han{font-size:1.5rem;color:var(--gold-light);line-height:1}
  .header-info{display:flex;gap:.6rem;align-items:center;flex-wrap:wrap;justify-content:flex-end}
  .score-chip{font-size:.78rem;padding:.28rem .7rem;border-radius:999px;border:1px solid rgba(255,255,255,.22);
    color:var(--paper);background:rgba(255,255,255,.08);white-space:nowrap}
  .score-chip strong{color:var(--gold-light)}
  .name-chip{font-size:.78rem;padding:.28rem .7rem;border-radius:999px;
    background:rgba(184,134,11,.25);border:1px solid rgba(184,134,11,.4);color:var(--gold-light);font-weight:500}

  main{max-width:740px;margin:0 auto;padding:2rem 1.25rem 4rem}

  /* 이름 입력 */
  .login-screen{display:flex;flex-direction:column;align-items:center;padding:3rem 1rem 2rem;text-align:center}
  .login-han{font-family:'Noto Serif KR',serif;font-size:4rem;font-weight:700;color:var(--ink);
    letter-spacing:.15em;margin-bottom:.5rem;line-height:1.1}
  .login-sub{font-size:.95rem;color:var(--ink-muted);margin-bottom:2.5rem;line-height:1.7}
  .login-card{background:var(--paper-card);border:1px solid var(--border);border-radius:16px;padding:2rem;
    width:100%;max-width:400px;box-shadow:0 4px 20px rgba(0,0,0,.06)}
  .login-card label{display:block;font-size:.85rem;font-weight:500;color:var(--ink-soft);margin-bottom:.5rem;text-align:left}
  .login-card input[type=text]{width:100%;padding:.75rem 1rem;border:1.5px solid var(--border-dark);border-radius:10px;
    font-family:'Noto Sans KR',sans-serif;font-size:1rem;color:var(--ink);background:var(--paper);
    outline:none;margin-bottom:1.25rem;transition:border-color .15s}
  .login-card input[type=text]:focus{border-color:var(--accent)}
  .login-card input[type=text]::placeholder{color:var(--border-dark)}
  .btn-start{width:100%;padding:.85rem;background:var(--ink);color:var(--paper);border:none;border-radius:10px;
    font-family:'Noto Sans KR',sans-serif;font-size:1rem;font-weight:500;cursor:pointer;transition:background .15s}
  .btn-start:hover{background:var(--ink-soft)}
  .login-rule{margin-top:1.5rem;font-size:.8rem;color:var(--ink-muted);line-height:1.9;text-align:left;
    background:var(--paper-warm);border-radius:8px;padding:.85rem 1rem}
  .login-rule b{color:var(--accent)}

  /* 진행 바 */
  .progress-wrap{margin-bottom:1.25rem}
  .progress-meta{display:flex;justify-content:space-between;font-size:.78rem;color:var(--ink-muted);margin-bottom:.4rem;align-items:center}
  .attempt-badge{font-size:.74rem;padding:.18rem .65rem;border-radius:999px;background:var(--accent-bg);
    color:var(--accent);border:1px solid rgba(139,58,42,.2);font-weight:500}
  .progress-bar{height:6px;background:var(--border);border-radius:999px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent) 0%,var(--gold) 100%);
    border-radius:999px;transition:width .4s cubic-bezier(.4,0,.2,1)}

  /* 연속 정답 도트 */
  .streak-bar{display:flex;gap:5px;margin-bottom:1.25rem;flex-wrap:wrap}
  .sdot{width:22px;height:22px;border-radius:50%;background:var(--border);border:1.5px solid var(--border-dark);transition:all .25s;flex-shrink:0}
  .sdot.ok{background:var(--correct);border-color:var(--correct)}
  .sdot.ng{background:var(--wrong);border-color:var(--wrong)}
  .sdot.cur{border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,134,11,.25)}

  /* 퀴즈 카드 */
  .quiz-card{background:var(--paper-card);border:1px solid var(--border);border-radius:16px;
    padding:2rem 2rem 1.5rem;box-shadow:0 4px 24px rgba(0,0,0,.06);position:relative;overflow:hidden}
  .quiz-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;
    background:linear-gradient(90deg,var(--accent),var(--gold))}
  .q-badge{display:inline-flex;align-items:center;font-size:.75rem;color:var(--accent);background:var(--accent-bg);
    border:1px solid rgba(139,58,42,.2);border-radius:999px;padding:.25rem .75rem;margin-bottom:1.25rem;font-weight:500}
  .q-question{font-family:'Noto Serif KR',serif;font-size:.92rem;color:var(--ink-muted);margin-bottom:1.25rem;line-height:1.7}

  .hanja-display{text-align:center;margin:.5rem 0 1.5rem;padding:1.25rem;background:var(--paper-warm);
    border-radius:12px;border:1px solid var(--border)}
  .hanja-chars{font-family:'Noto Serif KR',serif;font-size:3rem;font-weight:600;letter-spacing:.12em;color:var(--ink);line-height:1.2}
  .hanja-reading{font-size:.88rem;color:var(--ink-muted);margin-top:.4rem;letter-spacing:.04em;line-height:1.5}
  .meaning-display{font-family:'Noto Serif KR',serif;font-size:1.25rem;font-weight:600;color:var(--ink);
    text-align:center;padding:1.5rem 1rem;background:var(--paper-warm);border-radius:12px;
    border:1px solid var(--border);margin-bottom:1.5rem;line-height:1.6}

  .blank-char{display:inline-block;width:1.2em;border-bottom:3px solid var(--accent);color:transparent;
    position:relative;vertical-align:bottom}
  .blank-char::after{content:'?';position:absolute;left:50%;top:50%;transform:translate(-50%,-55%);
    color:var(--accent);font-size:.6em}

  .opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:.65rem;margin-bottom:1.25rem}
  .opt-btn{padding:.8rem 1rem;border:1.5px solid var(--border-dark);border-radius:10px;background:var(--paper-card);
    font-family:'Noto Sans KR',sans-serif;font-size:.88rem;color:var(--ink);cursor:pointer;text-align:left;
    line-height:1.5;transition:all .15s;overflow:hidden}
  .opt-btn:hover:not(:disabled){border-color:var(--accent);background:var(--accent-bg);
    transform:translateY(-1px);box-shadow:0 3px 10px rgba(139,58,42,.1)}
  .opt-btn.correct{background:var(--correct-bg);border-color:var(--correct);color:var(--correct);font-weight:500}
  .opt-btn.correct::before{content:'✓ ';font-weight:700}
  .opt-btn.wrong{background:var(--wrong-bg);border-color:var(--wrong);color:var(--wrong)}
  .opt-btn.wrong::before{content:'✗ ';font-weight:700}
  .opt-btn.reveal{background:var(--reveal-bg);border-color:var(--reveal);color:var(--reveal);font-weight:500}
  .opt-btn.reveal::before{content:'▶ '}
  .opt-btn:disabled{cursor:default;transform:none !important}
  .opt-btn.opt-hanja{font-family:'Noto Serif KR',serif;font-size:1.3rem;font-weight:600;
    text-align:center;letter-spacing:.1em;padding:1rem .75rem}

  .feedback-box{border-radius:10px;padding:.85rem 1.1rem;font-size:.88rem;line-height:1.6;margin-bottom:1rem;display:none}
  .feedback-box.ok{background:var(--correct-bg);color:var(--correct);border:1px solid rgba(45,106,79,.3);display:block}
  .feedback-box.ng{background:var(--wrong-bg);color:var(--wrong);border:1px solid rgba(123,45,45,.3);display:block}
  .feedback-extra{margin-top:.4rem;font-size:.82rem;opacity:.85}

  .card-footer{display:flex;justify-content:flex-end;gap:.65rem;margin-top:.5rem}
  .btn{padding:.6rem 1.4rem;border-radius:8px;font-family:'Noto Sans KR',sans-serif;font-size:.88rem;font-weight:500;
    cursor:pointer;transition:all .15s;border:1.5px solid var(--border-dark);background:transparent;color:var(--ink-soft)}
  .btn:hover{background:var(--paper-warm)}
  .btn.primary{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .btn.primary:hover{background:var(--ink-soft)}

  /* 결과 */
  .result-screen{display:none;text-align:center;padding:2.5rem 1rem}
  .result-screen.show{display:block}
  .result-emoji{font-size:3.5rem;margin-bottom:.75rem}
  .result-title{font-family:'Noto Serif KR',serif;font-size:1.5rem;font-weight:700;color:var(--ink);margin-bottom:.5rem}
  .result-name{font-family:'Noto Serif KR',serif;font-size:2rem;font-weight:700;color:var(--accent);margin-bottom:.5rem}
  .result-label{font-size:.9rem;color:var(--ink-muted);margin:.5rem 0 1.75rem;line-height:1.8}
  .result-stats{display:flex;gap:.75rem;justify-content:center;margin-bottom:1.75rem;flex-wrap:wrap}
  .stat-box{background:var(--paper-warm);border:1px solid var(--border);border-radius:10px;padding:.75rem 1.5rem;min-width:110px}
  .stat-box .sv{font-size:1.75rem;font-weight:700;font-family:'Noto Serif KR',serif;color:var(--ink)}
  .stat-box .sl{font-size:.75rem;color:var(--ink-muted);margin-top:.2rem}
  .result-actions{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap}
  .send-status{font-size:.82rem;margin-top:1.25rem;padding:.65rem 1rem;border-radius:8px;display:none}
  .send-status.sending{display:block;color:var(--ink-muted);background:var(--paper-warm)}
  .send-status.done{display:block;color:var(--correct);background:var(--correct-bg)}
  .send-status.fail{display:block;color:var(--wrong);background:var(--wrong-bg)}

  /* 실패 모달 */
  .fail-overlay{display:none;position:fixed;inset:0;background:rgba(26,20,16,.72);z-index:200;
    align-items:center;justify-content:center}
  .fail-overlay.show{display:flex}
  .fail-modal{background:var(--paper-card);border-radius:20px;padding:2.5rem 2rem;max-width:360px;
    width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .fail-modal .fe{font-size:3rem;margin-bottom:.75rem}
  .fail-modal h2{font-family:'Noto Serif KR',serif;font-size:1.3rem;font-weight:700;margin-bottom:.6rem}
  .fail-modal p{font-size:.88rem;color:var(--ink-muted);margin-bottom:1.5rem;line-height:1.7}
  .fail-modal .btn{width:100%}

  @media(max-width:520px){
    main{padding:1.25rem .75rem 3rem}
    .quiz-card{padding:1.5rem 1.1rem 1.25rem}
    .hanja-chars{font-size:2.2rem}
    .opts-grid{grid-template-columns:1fr}
    header{padding:.85rem 1rem}
    .logo{font-size:1rem}.logo .han{font-size:1.3rem}
    .sdot{width:17px;height:17px}
    .login-han{font-size:3rem}
  }
</style>
</head>
<body>

<header>
  <div class="logo"><span class="han">漢</span><span>성어 퀴즈</span></div>
  <div class="header-info">
    <div class="name-chip" id="hdr-name" style="display:none"></div>
    <div class="score-chip" id="hdr-score" style="display:none">
      정답 <strong id="hdr-correct">0</strong> / <strong id="hdr-qi">0</strong>
    </div>
    <div class="score-chip" id="hdr-attempt" style="display:none">
      <strong id="hdr-try">1</strong>번째 도전
    </div>
  </div>
</header>

<main>

  <!-- 이름 입력 -->
  <div id="login-screen" class="login-screen">
    <div class="login-han">漢文<br>成語</div>
    <p class="login-sub">18개 성어 · 15문제 연속 도전<br>한 문제라도 틀리면 처음부터 다시!</p>
    <div class="login-card">
      <label for="name-input">학번을 입력하세요</label>
      <input type="text" id="name-input" placeholder="예) 1101" maxlength="4"
        onkeydown="if(event.key==='Enter')startQuiz()">
      <button class="btn-start" onclick="startQuiz()">퀴즈 시작하기 →</button>
      <div class="login-rule">
        <b>도전 규칙</b><br>
        · 세 가지 유형의 문제 15개를 연속으로 모두 맞혀야 합니다.<br>
        · 하나라도 틀리면 즉시 새 문제 세트로 재도전합니다.<br>
        · 15문제 연속 성공 시 선생님께 결과가 자동 전송됩니다.
      </div>
    </div>
  </div>

  <!-- 퀴즈 화면 -->
  <div id="quiz-screen" style="display:none">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span id="prog-label">문제 1 / 15</span>
        <span class="attempt-badge" id="attempt-badge">1번째 도전</span>
        <span id="prog-pct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div class="streak-bar" id="streak-bar"></div>
    <div class="quiz-card">
      <div class="q-badge" id="q-badge"></div>
      <p class="q-question" id="q-question"></p>
      <div id="q-display"></div>
      <div class="opts-grid" id="opts-grid"></div>
      <div class="feedback-box" id="feedback"></div>
      <div class="card-footer">
        <button class="btn primary" id="next-btn" style="display:none" onclick="onNext()">다음 문제 →</button>
      </div>
    </div>
  </div>

  <!-- 결과 화면 -->
  <div class="result-screen" id="result-screen">
    <div class="result-emoji">🏆</div>
    <div class="result-title">15문제 연속 성공!</div>
    <div class="result-name" id="res-name"></div>
    <div class="result-label" id="res-label"></div>
    <div class="result-stats">
      <div class="stat-box"><div class="sv" id="res-attempts">-</div><div class="sl">총 도전 횟수</div></div>
      <div class="stat-box"><div class="sv" id="res-total-q">-</div><div class="sl">총 푼 문제 수</div></div>
      <div class="stat-box"><div class="sv">15</div><div class="sl">연속 정답</div></div>
    </div>
    <div class="result-actions">
      <button class="btn primary" onclick="goHome()">처음으로</button>
    </div>
    <div class="send-status" id="send-status"></div>
  </div>

</main>

<!-- 실패 모달 -->
<div class="fail-overlay" id="fail-overlay">
  <div class="fail-modal">
    <div class="fe">😓</div>
    <h2>아쉬워요!</h2>
    <p id="fail-msg">틀렸습니다.<br>새로운 문제 세트로 다시 도전해 봐요!</p>
    <button class="btn primary" onclick="retryAfterFail()">다시 도전하기 →</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════
//  ★ 여기에 Google Apps Script 배포 URL을 붙여넣으세요 ★

  {h:"肝膽相照",r:"간담상조",m:"간과 쓸개를 서로 비춤 (속마음을 털어놓는 우정)",chars:[{c:"肝",r:"간",m:"간"},{c:"膽",r:"담",m:"쓸개"},{c:"相",r:"상",m:"서로"},{c:"照",r:"조",m:"비추다"}]},
  {h:"金蘭之交",r:"금란지교",m:"금과 난초 같은 아름다운 우정",chars:[{c:"金",r:"금",m:"쇠·금"},{c:"蘭",r:"란",m:"난초"},{c:"之",r:"지",m:"~의"},{c:"交",r:"교",m:"사귀다"}]},
  {h:"出告反面",r:"출곡반면",m:"나갈 때는 말씀드리고 돌아오면 얼굴을 뵙는다",chars:[{c:"出",r:"출",m:"나오다"},{c:"告",r:"곡",m:"아뢰다"},{c:"反",r:"반",m:"돌이키다"},{c:"面",r:"면",m:"얼굴"}]},
  {h:"家和萬事成",r:"가화만사성",m:"집안이 화목하면 모든 일이 이루어짐",chars:[{c:"家",r:"가",m:"집"},{c:"和",r:"화",m:"화목하다"},{c:"萬",r:"만",m:"일만·모든"},{c:"事",r:"사",m:"일"},{c:"成",r:"성",m:"이루다"}]},
  {h:"望雲之情",r:"망운지정",m:"구름을 바라보며 고향·부모를 그리워하는 마음",chars:[{c:"望",r:"망",m:"바라보다"},{c:"雲",r:"운",m:"구름"},{c:"之",r:"지",m:"~의"},{c:"情",r:"정",m:"정·마음"}]},
  {h:"反哺之孝",r:"반포지효",m:"까마귀처럼 어미에게 먹이를 되먹여 은혜에 보답함",chars:[{c:"反",r:"반",m:"돌이키다"},{c:"哺",r:"포",m:"먹이다"},{c:"之",r:"지",m:"~의"},{c:"孝",r:"효",m:"효도"}]},
];

const Q_PER_TYPE = 5;
const TOTAL_Q = 15;

let studentName='', attempts=0, totalSolved=0;
let questions=[], qi=0, answered=false, qData=null;
let failPending=false; // 오답 후 다음 버튼 누르면 모달 표시

function shuffle(a){return [...a].sort(()=>Math.random()-.5)}
function wrongOpts(correct,field,n=3){
  return shuffle([correct,...shuffle(IDIOMS.filter(x=>x[field]!==correct).map(x=>x[field])).slice(0,n)]);
}

function makeM2M(item){
  return {badge:'① 의미 → 성어 고르기',question:'다음 뜻풀이에 해당하는 성어를 고르세요.',
    displayHTML:`<div class="meaning-display">${item.m}</div>`,
    opts:wrongOpts(item.h,'h'),answer:item.h,isHanja:true,
    extraHTML:`<span style="font-family:'Noto Serif KR',serif">${item.h}</span> (${item.r}) : ${item.m}`};
}
function makeH2M(item){
  return {badge:'② 한자 → 의미 고르기',question:'다음 한자 성어의 뜻으로 알맞은 것을 고르세요.',
    displayHTML:`<div class="hanja-display"><div class="hanja-chars">${item.h}</div><div class="hanja-reading">${item.r}</div></div>`,
    opts:wrongOpts(item.m,'m'),answer:item.m,isHanja:false,
    extraHTML:`정답: <strong>${item.m}</strong>`};
}
function makeFill(item){
  const bi=Math.floor(Math.random()*item.chars.length),bc=item.chars[bi];
  const dc=item.chars.map((c,i)=>i===bi?`<span class="blank-char">${c.c}</span>`:c.c).join('');
  const pool=shuffle(IDIOMS.flatMap(x=>x.chars).filter(c=>c.c!==bc.c)).slice(0,3).map(c=>`${c.c}（${c.r}：${c.m}）`);
  const co=`${bc.c}（${bc.r}：${bc.m}）`;
  return {badge:'③ 빈칸 채우기',question:'빈칸에 들어갈 알맞은 한자를 고르세요.',
    displayHTML:`<div class="hanja-display"><div class="hanja-chars">${dc}</div><div class="hanja-reading">${item.m}</div></div>`,
    opts:shuffle([co,...pool]),answer:co,isHanja:false,extraHTML:`빈칸의 뜻: <strong>${bc.m}</strong>`};
}

function generateQuestions(){
  const s=shuffle(IDIOMS);
  return shuffle([...s.slice(0,Q_PER_TYPE).map(makeM2M),...s.slice(Q_PER_TYPE,Q_PER_TYPE*2).map(makeH2M),...s.slice(Q_PER_TYPE*2,Q_PER_TYPE*3).map(makeFill)]);
}

// ── 이름 입력 후 시작 ──
function startQuiz(){
  const n=document.getElementById('name-input').value.trim();
  if(!n){alert('학번을 입력해 주세요.');return;}
  studentName=n;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('hdr-name').textContent=n;
  document.getElementById('hdr-name').style.display='';
  document.getElementById('hdr-score').style.display='';
  document.getElementById('hdr-attempt').style.display='';
  newAttempt();
}

// ── 새 도전 ──
function newAttempt(){
  attempts++;
  qi=0;answered=false;failPending=false;
  questions=generateQuestions();
  document.getElementById('quiz-screen').style.display='block';
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('hdr-try').textContent=attempts;
  document.getElementById('attempt-badge').textContent=`${attempts}번째 도전`;
  buildStreakBar();
  renderQ();
}

function buildStreakBar(){
  document.getElementById('streak-bar').innerHTML=
    Array.from({length:TOTAL_Q},(_,i)=>`<div class="sdot${i===0?' cur':''}" id="sd${i}"></div>`).join('');
}
function markDot(i,ok){
  const d=document.getElementById('sd'+i);
  if(d){d.classList.remove('cur');d.classList.add(ok?'ok':'ng');}
  const n=document.getElementById('sd'+(i+1));
  if(n) n.classList.add('cur');
}

function renderQ(){
  qData=questions[qi];answered=false;failPending=false;
  const pct=Math.round(qi/TOTAL_Q*100);
  document.getElementById('prog-label').textContent=`문제 ${qi+1} / ${TOTAL_Q}`;
  document.getElementById('prog-pct').textContent=`${pct}%`;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('hdr-correct').textContent=questions.filter((q,i)=>i<qi&&q.result).length;
  document.getElementById('hdr-qi').textContent=qi;
  document.getElementById('q-badge').textContent=qData.badge;
  document.getElementById('q-question').textContent=qData.question;
  document.getElementById('q-display').innerHTML=qData.displayHTML;
  document.getElementById('feedback').className='feedback-box';
  document.getElementById('feedback').innerHTML='';
  document.getElementById('next-btn').style.display='none';
  document.getElementById('next-btn').textContent='다음 문제 →';
  document.getElementById('opts-grid').innerHTML=qData.opts.map((o,i)=>
    `<button class="opt-btn${qData.isHanja?' opt-hanja':''}" id="opt${i}" onclick="pick(${i})">${o}</button>`
  ).join('');
}

function pick(i){
  if(answered)return;
  answered=true;totalSolved++;
  const ok=qData.opts[i]===qData.answer;
  qData.result=ok;
  qData.opts.forEach((o,idx)=>{
    const b=document.getElementById('opt'+idx);b.disabled=true;
    if(o===qData.answer)b.classList.add(ok?'correct':'reveal');
    if(idx===i&&!ok)b.classList.add('wrong');
  });
  const fb=document.getElementById('feedback');
  fb.className='feedback-box '+(ok?'ok':'ng');
  fb.innerHTML=(ok?'✓ 정답입니다!':'✗ 오답입니다.')+`<div class="feedback-extra">${qData.extraHTML}</div>`;
  markDot(qi,ok);
  const nb=document.getElementById('next-btn');
  nb.style.display='';
  if(!ok){
    failPending=true;
    nb.textContent='확인 →';
  } else {
    nb.textContent=(qi+1<TOTAL_Q)?'다음 문제 →':'결과 보기 →';
  }
}

function onNext(){
  if(failPending){
    document.getElementById('fail-msg').innerHTML=
      `${qi+1}번 문제에서 틀렸어요.<br>새로운 문제 세트로 다시 도전해 봐요!`;
    document.getElementById('fail-overlay').classList.add('show');
    return;
  }
  qi++;
  if(qi>=TOTAL_Q) showResult();
  else renderQ();
}

function retryAfterFail(){
  document.getElementById('fail-overlay').classList.remove('show');
  newAttempt();
}

function showResult(){
  document.getElementById('quiz-screen').style.display='none';
  const rs=document.getElementById('result-screen');rs.classList.add('show');
  document.getElementById('res-name').textContent=studentName;
  document.getElementById('res-attempts').textContent=attempts;
  document.getElementById('res-total-q').textContent=totalSolved;
  document.getElementById('res-label').textContent=
    attempts===1?'단 한 번에 완벽하게 성공했어요! 정말 대단해요!':
    `${attempts}번의 도전 끝에 마침내 연속 성공! 포기하지 않은 당신이 멋져요.`;
  document.getElementById('prog-fill').style.width='100%';
  document.getElementById('prog-pct').textContent='100%';
  sendToSheet();
}

function sendToSheet(){
  const ss=document.getElementById('send-status');
if(SHEET_URL==='YOUR_APPS_SCRIPT_URL_HERE'){
    ss.className='send-status fail';
    ss.textContent='⚠ 구글 시트 URL이 아직 설정되지 않았습니다. (교사 설정 필요)';
    return;
  }
  ss.className='send-status sending';ss.textContent='선생님께 결과를 전송하는 중...';
  const now=new Date();
  const ts=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  fetch(`${SHEET_URL}?name=${encodeURIComponent(studentName)}&attempts=${attempts}&totalSolved=${totalSolved}&completed=O&timestamp=${encodeURIComponent(ts)}`,{method:'GET',mode:'no-cors'})
    .then(()=>{ss.className='send-status done';ss.textContent='✓ 선생님께 결과가 전송되었습니다!';})
    .catch(()=>{ss.className='send-status fail';ss.textContent='전송 실패. 선생님께 직접 알려주세요.';});
}

function goHome(){
  studentName='';attempts=0;totalSolved=0;
  document.getElementById('name-input').value='';
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('hdr-name').style.display='none';
  document.getElementById('hdr-score').style.display='none';
  document.getElementById('hdr-attempt').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('send-status').className='send-status';
}
</script>
</body>
